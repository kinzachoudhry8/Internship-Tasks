<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1c1c1c;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ede6;
      --muted: #888;
      --border: #2a2a2a;
      --red: #e05c5c;
      --green: #5cb85c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 2rem 0 3rem;
    }
    .app-tag {
      display: inline-block;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); border: 1px solid var(--gold);
      padding: 0.3rem 1rem; border-radius: 50px; margin-bottom: 1rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }
    header h1 em { color: var(--gold); font-style: italic; }
    header p { color: var(--muted); font-size: 0.9rem; }

    /* STATS BAR */
    .stats-bar {
      display: flex; gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 1rem; text-align: center;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; color: var(--gold); display: block;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    /* ADD TASK */
    .add-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .add-section h2 {
      font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem;
    }
    .input-row {
      display: flex; gap: 0.7rem; margin-bottom: 0.8rem;
    }
    .task-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.3s;
    }
    .task-input:focus { border-color: var(--gold); }
    .task-input::placeholder { color: var(--muted); }
    select.task-input {
      cursor: pointer; max-width: 150px;
    }
    .btn-add {
      background: var(--gold); color: #0d0d0d;
      border: none; border-radius: 4px; padding: 0.75rem 1.5rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: background 0.3s, transform 0.2s; white-space: nowrap;
    }
    .btn-add:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* FILTERS */
    .filter-bar {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; padding: 0.4rem 1rem;
      color: var(--muted); font-size: 0.8rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--gold); color: #0d0d0d; border-color: var(--gold); font-weight: 500; }
    .filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
    .search-input {
      margin-left: auto; background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; color: var(--text); padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; outline: none;
      transition: border-color 0.3s; width: 160px;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--muted); }

    /* TASK LIST */
    .task-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .task-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 1rem 1.2rem;
      display: flex; align-items: center; gap: 1rem;
      transition: border-color 0.3s, opacity 0.3s, transform 0.3s;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: #333; }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .task-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .task-check:hover { border-color: var(--gold); }
    .task-check.checked { background: var(--gold); border-color: var(--gold); }
    .task-check.checked::after { content: '✓'; font-size: 0.7rem; color: #0d0d0d; font-weight: 700; }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 0.9rem; word-break: break-word; }
    .task-meta { display: flex; gap: 0.6rem; margin-top: 0.3rem; align-items: center; }

    .priority-badge {
      font-size: 0.65rem; padding: 0.15rem 0.6rem;
      border-radius: 50px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    }
    .priority-high   { background: rgba(224,92,92,0.15); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }
    .priority-medium { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .priority-low    { background: rgba(92,184,92,0.15); color: var(--green); border: 1px solid rgba(92,184,92,0.3); }

    .task-date { font-size: 0.7rem; color: var(--muted); }

    .task-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .icon-btn:hover.edit-btn { border-color: var(--gold); color: var(--gold); }
    .icon-btn:hover.del-btn  { border-color: var(--red);  color: var(--red);  }

    /* EDIT MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 2rem; width: 90%; max-width: 420px;
      transform: translateY(20px); transition: transform 0.3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; margin-bottom: 1.2rem; color: var(--gold);
    }
    .modal-actions { display: flex; gap: 0.7rem; margin-top: 1rem; justify-content: flex-end; }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px; padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 3rem;
      color: var(--muted); font-size: 0.9rem;
    }
    .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }

    /* CLEAR BTN */
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .bottom-info { font-size: 0.8rem; color: var(--muted); }
    .btn-clear {
      background: transparent; border: 1px solid rgba(224,92,92,0.3);
      color: var(--red); border-radius: 4px; padding: 0.5rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { background: rgba(224,92,92,0.1); }

    @media (max-width: 500px) {
      body { padding: 1rem; }
      .input-row { flex-wrap: wrap; }
      select.task-input { max-width: 100%; }
      .stats-bar { flex-wrap: wrap; }
      .search-input { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <span class="app-tag">✦ Stay Organized</span>
    <h1>Task<em>Flow</em></h1>
    <p>Your elegant to-do companion — add, edit, complete, repeat.</p>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-num" id="stat-active">0</span><span class="stat-label">Active</span></div>
    <div class="stat"><span class="stat-num" id="stat-done">0</span><span class="stat-label">Completed</span></div>
  </div>

  <!-- ADD TASK -->
  <div class="add-section">
    <h2>✦ New Task</h2>
    <div class="input-row">
      <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" maxlength="200"/>
      <select class="task-input" id="priority-select">
        <option value="medium">⚡ Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div class="input-row">
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
    <input class="search-input" id="search" placeholder="🔍 Search tasks..." oninput="renderTasks()"/>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="task-list"></div>
  <div class="empty" id="empty-state" style="display:none">
    <span class="empty-icon">✨</span>
    <p>No tasks here — enjoy the silence!</p>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span class="bottom-info" id="bottom-info"></span>
    <button class="btn-clear" onclick="clearCompleted()">Clear Completed</button>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>✏️ Edit Task</h3>
    <div class="input-row" style="margin-bottom:0.8rem">
      <input class="task-input" id="edit-input" type="text" style="flex:1" placeholder="Task text..." maxlength="200"/>
    </div>
    <div class="input-row">
      <select class="task-input" id="edit-priority">
        <option value="medium">⚡ Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow-tasks') || '[]');
  let currentFilter = 'all';
  let editingId = null;

  function save() {
    localStorage.setItem('taskflow-tasks', JSON.stringify(tasks));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { input.focus(); input.style.borderColor = 'var(--red)'; setTimeout(() => input.style.borderColor = '', 800); return; }
    const priority = document.getElementById('priority-select').value;
    tasks.unshift({ id: genId(), text, priority, done: false, created: new Date().toLocaleDateString('en-GB') });
    input.value = '';
    save(); renderTasks(); updateStats();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); renderTasks(); updateStats(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); renderTasks(); updateStats();
  }

  function openEdit(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('edit-input').value = t.text;
    document.getElementById('edit-priority').value = t.priority;
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('edit-input').focus(), 100);
  }

  function saveEdit() {
    const text = document.getElementById('edit-input').value.trim();
    if (!text) return;
    const t = tasks.find(t => t.id === editingId);
    if (t) { t.text = text; t.priority = document.getElementById('edit-priority').value; }
    save(); renderTasks(); updateStats(); closeModal();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    save(); renderTasks(); updateStats();
  }

  function getFiltered() {
    const q = document.getElementById('search').value.toLowerCase();
    return tasks.filter(t => {
      const matchFilter =
        currentFilter === 'all'    ? true :
        currentFilter === 'active' ? !t.done :
        currentFilter === 'done'   ? t.done :
        currentFilter === 'high'   ? t.priority === 'high' : true;
      const matchSearch = t.text.toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    const filtered = getFiltered();
    list.innerHTML = '';

    if (filtered.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
    } else {
      document.getElementById('empty-state').style.display = 'none';
      filtered.forEach(t => {
        const item = document.createElement('div');
        item.className = 'task-item' + (t.done ? ' done' : '');
        item.innerHTML = `
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleDone('${t.id}')"></div>
          <div class="task-body">
            <p class="task-text">${escHtml(t.text)}</p>
            <div class="task-meta">
              <span class="priority-badge priority-${t.priority}">${t.priority}</span>
              <span class="task-date">${t.created}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn edit-btn" onclick="openEdit('${t.id}')" title="Edit">✏️</button>
            <button class="icon-btn del-btn" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
          </div>`;
        list.appendChild(item);
      });
    }

    const done = tasks.filter(t => t.done).length;
    document.getElementById('bottom-info').textContent =
      `${done} of ${tasks.length} tasks completed`;
  }

  function updateStats() {
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-total').textContent  = tasks.length;
    document.getElementById('stat-active').textContent = tasks.length - done;
    document.getElementById('stat-done').textContent   = done;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key to add
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('edit-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); });

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

  // Initial render
  renderTasks(); updateStats();
</script>
</body>
</html>
